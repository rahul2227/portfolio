# Portfolio Nginx configuration
# Serves React SPA static files and proxies /api to FastAPI backend

server {
    listen 80 default_server;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Enable gzip compression for text-based assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Vite content-hashed assets — cache aggressively (1 year)
    location /assets/ {
        alias /home/rahser/portfolio/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API requests — proxy to FastAPI backend, strip /api prefix
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for slower Pi responses
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Handwritten text recognition demo — Streamlit on port 8502
    # Requires WebSocket upgrade headers for Streamlit's internal communication
    location /demo/ocr/ {
        proxy_pass http://127.0.0.1:8502/;
        proxy_http_version 1.1;

        # WebSocket upgrade — Streamlit uses WS for live UI updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout than API — inference on Pi can take several seconds
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # Streamlit internal static assets (JS/CSS served by _stcore)
    # Must be a separate block so the path is forwarded verbatim without stripping
    location /demo/ocr/_stcore/ {
        proxy_pass http://127.0.0.1:8502/_stcore/;
    }

    # SPA fallback — serve index.html for client-side routing
    location / {
        root /home/rahser/portfolio/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
